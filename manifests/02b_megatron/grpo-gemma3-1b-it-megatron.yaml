# Consolidated GRPO Configuration for Gemma-3-27B (Megatron Backend)
grpo:
  num_prompts_per_step: 8 # From 8B
  num_generations_per_prompt: 8 # From 8B
  max_rollout_turns: 1 
  max_num_epochs: 1
  max_num_steps: 2 # User override
  normalize_rewards: true
  use_leave_one_out_baseline: true
  val_period: 5 # User override
  val_at_start: true # User override
  val_at_end: true # User override
  overlong_filtering: false
  max_val_samples: 8
  val_batch_size: 8
  seed: 42
  use_dynamic_sampling: false
  dynamic_sampling_max_gen_batches: 10
  batch_multiplier: 1
  reward_shaping:
    enabled: false
    overlong_buffer_length: 128
    overlong_buffer_penalty: 1
    max_response_length: ${policy.max_total_sequence_length}
    stop_properly_penalty_coef: null

  adv_estimator:
    name: "grpo"  
    normalize_rewards: ${grpo.normalize_rewards}
    use_leave_one_out_baseline: ${grpo.use_leave_one_out_baseline}
    minus_baseline: true  
  reward_scaling:
    enabled: false
    source_min: 0.0
    source_max: 1.0
    target_min: 0.0
    target_max: 1.0
  seq_logprob_error_threshold: null

  async_grpo:
    enabled: false 
    max_trajectory_age_steps: 1
    in_flight_weight_updates: false 
    recompute_kv_cache_after_weight_updates: false 

loss_fn:
  reference_policy_kl_penalty: 0.01
  reference_policy_kl_type: "k3"
  kl_input_clamp_value: 20.0
  kl_output_clamp_value: 10.0
  ratio_clip_min: 0.2
  ratio_clip_max: 0.2
  ratio_clip_c: null
  use_on_policy_kl_approximation: false
  use_importance_sampling_correction: false
  truncated_importance_sampling_ratio: null
  truncated_importance_sampling_ratio_min: null  
  truncated_importance_sampling_type: tis  
  sequence_level_importance_ratios: false
  token_level_loss: true
  force_on_policy_ratio: false  
  use_kl_in_reward: false  

checkpointing:
  enabled: false # From Megatron base
  checkpoint_dir: "results/grpo-gemma3-1b-it-megatron" # User override
  metric_name: "val:accuracy" 
  higher_is_better: true
  save_nemo_format: false
  model_save_format: "torch_save"  
  save_consolidated: false      
  save_optimizer: false
  keep_top_k: 3
  save_period: 10
  checkpoint_must_save_by: null

policy:
  model_name: "google/gemma-3-1b-it" # User override
  tokenizer:
    name: "google/gemma-3-1b-it" # User override
    chat_template_kwargs: 
      enable_thinking: true # User override
  train_global_batch_size: 8 # Lowered from 512 for full FT stability
  train_micro_batch_size: 1
  generation_batch_size: 8 # Lowered from 16 to prevent Step 2 KV OOM preemption
  attention_dropout: 0.0
  hidden_dropout: 0.0
  logprob_batch_size: 8
  max_total_sequence_length: 1024 # User override
  precision: "bfloat16" # From 8B
  logprob_chunk_size: null
  offload_optimizer_for_logprob: false 

  dtensor_cfg:
    enabled: false # From Megatron config

  megatron_cfg:
    enabled: true
    empty_unused_memory_level: 1  
    activation_checkpointing: false
    converter_type: "Gemma3ForCausalLM" # User override
    tensor_model_parallel_size: 1 # User override, bumped from 4 to fit 27B optimizer state
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 1
    pipeline_model_parallel_size: 1 # User override
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    context_parallel_size: 1
    pipeline_dtype: ${policy.precision}
    sequence_parallel: false
    freeze_moe_router: true
    moe_router_dtype: "fp64"
    moe_router_load_balancing_type: "none" 
    moe_router_bias_update_rate: 0.0 
    moe_permute_fusion: false
    apply_rope_fusion: False
    untie_embeddings_and_output_weights: False
    bias_activation_fusion: False
    defer_fp32_logits: False
    moe_per_layer_logging: False
    moe_enable_deepep: false
    moe_token_dispatcher_type: "allgather"
    moe_shared_expert_overlap: false

    optimizer:
      optimizer: "adam"
      lr: 3.0e-7 # From 8B
      min_lr: 3.0e-8 # From 8B
      weight_decay: 0.01 # From 8B
      bf16: true # From 8B
      fp16: false
      params_dtype: "float32"
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1e-8
      sgd_momentum: 0.9
      use_distributed_optimizer: true
      use_precision_aware_optimizer: true
      clip_grad: ${policy.max_grad_norm}
      optimizer_cpu_offload: false
      optimizer_offload_fraction: 0.0

    scheduler:
      start_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      end_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      weight_decay_incr_style: "constant"
      lr_decay_style: "constant"
      lr_decay_iters: 1000 # From 8B
      lr_warmup_iters: 13 # From 8B
      lr_warmup_init: 3.0e-8 # From 8B

    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: false # Disabling to prevent crashes on Gemma 3's unused vision encoder parameters
      overlap_param_gather: true
      use_custom_fsdp: false
      data_parallel_sharding_strategy: "optim_grads_params"

    fp8_cfg: 
      enabled: false
      fp8: "e4m3"
      fp8_recipe: "blockwise"
      fp8_param: false

    env_vars: 
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

  dynamic_batching:
    enabled: False # From Megatron config
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    sequence_length_round: 64

  sequence_packing:
    enabled: False # From Megatron config
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    algorithm: "modified_first_fit_decreasing"
    sequence_length_round: 64

  make_sequence_length_divisible_by: ${policy.megatron_cfg.tensor_model_parallel_size}
  max_grad_norm: 1.0

  optimizer: null # remove default FSDP optimizer
  scheduler: null # remove default FSDP scheduler

  generation:
    backend: "megatron" # Switched from vllm to resolve deadlock
    max_new_tokens: 256 # User override
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    mcore_generation_config:
      buffer_size_gb: 4  
      buffer_guaranteed_fraction: 0.1  
      num_cuda_graphs: 0  
      block_size_tokens: 256  
      use_cuda_graphs_for_non_decode_steps: false  
      enable_chunked_prefill: true  
      unified_memory_level: 0  
      max_tokens: 1024 # User override
    vllm_cfg:
      async_engine: false
      precision: ${policy.precision}
      kv_cache_dtype: "auto"
      tensor_parallel_size: 1 # Must match megatron_cfg.tensor_model_parallel_size
      pipeline_parallel_size: 1
      expert_parallel_size: 1  
      gpu_memory_utilization: 0.6 # From 8B
      max_model_len: 1024 # User override
      block_size: 32
      enforce_eager: True
      use_deep_gemm: False
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      enable_vllm_metrics_logger: false 
      vllm_metrics_logger_interval: 0.5 
    vllm_kwargs: {}
    colocated:
      enabled: true
      resources:
        gpus_per_node: null 
        num_nodes: null 

data:
  max_input_seq_length: 512 # User override
  shuffle: true
  num_workers: 1

  dataset_name: OpenMathInstruct-2
  split_validation_size: 0.05
  seed: ${grpo.seed}
  prompt_file: "examples/prompts/cot.txt"
  system_prompt_file: null
  processor: "math_hf_data_processor"
  env_name: "math"

env:
  math:
    num_workers: 8
    math_verify_impl: "hf_math_verify"

logger:
  log_dir: "/data/nemo-rl-logs/grpo-gemma3-27b-it-megatron"  # User override
  num_val_samples_to_print: 1 
  wandb_enabled: false # User override
  tensorboard_enabled: true # User override
  mlflow_enabled: false  
  swanlab_enabled: false 
  monitor_gpus: true  
  wandb:
    project: "grpo-dev"
    name: "grpo-dev-logger"
  swanlab:
    project: "grpo-dev"
    name: "grpo-dev-logger"
  tensorboard: {}
  mlflow:
    experiment_name: "grpo-dev"
    run_name: "grpo-dev-logger"
  gpu_monitoring:
    collection_interval: 10  
    flush_interval: 10  

cluster:
  gpus_per_node: 8 # User override
  num_nodes: 1
