defaults: grpo_math_1b.yaml

grpo:
  max_num_steps: 500

checkpointing:
  checkpoint_dir: /data/nemo-rl-results/grpo-gemma3-1b-it-1n8g-fsdp2tp1-b200

policy:
  model_name: google/gemma-3-1b-it
  tokenizer:
    name: google/gemma-3-1b-it
    chat_template_kwargs:
      enable_thinking: true
  dynamic_batching:
    enabled: true
  sequence_packing:
    enabled: false
  make_sequence_length_divisible_by: 1
  generation:
    max_new_tokens: 512
    vllm_cfg:
      max_model_len: 512
      enforce_eager: true
      load_format: "auto"
    vllm_kwargs:
      block_size: 32

data:
  max_input_seq_length: 512

logger:
  log_dir: /data/nemo-rl-logs/grpo-gemma3-1b-it-1n8g-fsdp2tp1-b200
  wandb_enabled: false
  tensorboard_enabled: true

cluster:
  gpus_per_node: 8
